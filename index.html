<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>BrsLevelsEditor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #231F20;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #231F20;
        outline: none;
      }

      #unity-loading-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: #fff;
        background: #0a0a0a;
        z-index: 10;
      }

      #unity-loading-title {
        font-size: 16px;
        letter-spacing: 0.04em;
        opacity: 0.85;
      }

      #unity-progress-bar-empty {
        width: 280px;
        height: 8px;
        border-radius: 4px;
        background: #1f1f1f;
        overflow: hidden;
      }

      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: #4a90ff;
        transition: width 0.15s ease-out;
      }

      #unity-warning {
        position: fixed;
        left: 50%;
        top: 16px;
        transform: translate(-50%, 0);
        padding: 10px 16px;
        border-radius: 4px;
        background: rgba(255, 174, 0, 0.95);
        color: #1a1a1a;
        z-index: 20;
        display: none;
        max-width: 80vw;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-overlay">
        <div id="unity-loading-title">BrsLevelsEditor</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingOverlay = document.querySelector("#unity-loading-overlay");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }
        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == "error") {
          div.style.color = "#b00020";
        } else if (type == "warning") {
          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      // Prevent the browser from intercepting Ctrl+S / Ctrl+Alt+S so it does not
      // open the "Save Page" dialog while the editor is focused.
      document.addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && (e.key === "s" || e.key === "S")) {
          e.preventDefault();
        }
      }, true);

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Level-Editor.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Level-Editor.data.unityweb",
        frameworkUrl: buildUrl + "/Level-Editor.framework.js.unityweb",
        codeUrl: buildUrl + "/Level-Editor.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "BrsLevelsEditor",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        matchWebGLToCanvasSize: true,
        devicePixelRatio: window.devicePixelRatio || 1
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then(function (unityInstance) {
          loadingOverlay.style.display = "none";
          window._unityInstance = unityInstance;
          canvas.focus();
        }).catch(function (message) {
          unityShowBanner(message, "error");
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
